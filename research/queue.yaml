- id: dct-seeking-sweep
  question: How does DCT seeking rate (mu) affect group detection accuracy?
  status: pending
  priority: 4
  created_by: seed
  config:
    type: parameter_sweep
    param: mu
    values:
    - 0.01
    - 0.05
    - 0.1
    - 0.3
    - 0.5
    - 1.0
    simulator:
      n_agents: 40
      scenario: clustered
      k: 3
      T: 30
      seed: 42
    theories:
      DCT:
        mu: 0.3
        lam: 0.05
        noise: 0.1
        threshold: 0.3
